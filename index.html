<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaifullah & Suraya</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&display=swap" rel="stylesheet">
</head>
<body class="locked"> <!-- Starts with locked scroll behavior -->

    <!-- Single, unified audio element with correct fallback -->
    <audio id="weddingMusic" loop>
        <source src="mp3/song 1.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="mobile-container">
        
        <!-- Welcome Screen -->
        <section class="screen" id="home">
            <h2 class="title">Undangan Raja Sehari</h2>
            <div class="monogram">
                <img src="img/initial logo.png" alt="Initial Logo">
            </div>
            <p class="verse">"وَخَلَقۡنَٰكُمۡ أَزۡوَٰجٗا"</p>
            <p class="text-ver">"And We created you in pairs"<br>-Surah An-Naba 78:8-</p>
            <h1 class="names">Shaifullah Ahmad<br>&<br>Suraya Zulkifli</h1>
            
            <button onclick="openInvitation()" class="btn" style="cursor: pointer; border: none; text-decoration: none; display: inline-block;">Buka Undangan</button>
        </section>
        
        <!-- Details Section -->
        <section class="screen" id="details">
            <h2 class="title">Butiran Majlis</h2>

            <div class="toggle-container">
                <button class="toggle-btn active" onclick="switchEvent('perempuan')">Bersanding</button>
                <button class="toggle-btn" onclick="switchEvent('lelaki')">Bertandang</button>
            </div>
            
            <div class="countdown-grid">
                <div class="countdown-box"><div class="countdown-num" id="days">00</div><div class="countdown-label">Days</div></div>
                <div class="countdown-box"><div class="countdown-num" id="hours">00</div><div class="countdown-label">Hrs</div></div>
                <div class="countdown-box"><div class="countdown-num" id="mins">00</div><div class="countdown-label">Min</div></div>
                <div class="countdown-box"><div class="countdown-num" id="secs">00</div><div class="countdown-label">Sec</div></div>
            </div>

            <!-- Dynamic Info Cards -->
            <div class="info-card" id="event-info">
                <!-- Content injected programmatically by JavaScript -->
            </div>
        
            <div class="map-button-group">
                <a href="#" id="go-maps" target="_blank" class="map-btn btn-google">🚗 G-MAPS</a>
                <a href="#" id="go-waze" target="_blank" class="map-btn btn-waze">🎯 WAZE</a>
            </div>
        </section>

    </div>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="#home" class="nav-item">
            <span class="nav-icon">🏠</span>
            <span>Utama</span>
        </a>
        <a href="#rsvp" class="nav-item">
            <span class="nav-icon">✍️</span>
            <span>RSVP</span>
        </a> 
        
        <!-- Music Toggle Button -->
        <div class="nav-item" onclick="toggleMusic()" style="cursor: pointer;">
            <div class="music-toggle" id="musicBtn"></div>
            <span style="font-size: 11px; margin-top: 2px;">Muzik</span>
        </div>
        
        <a href="#details" class="nav-item">
            <span class="nav-icon">📅</span>
            <span>Majlis</span>
        </a>

        <a href="javascript:void(0)" class="nav-item" onclick="openContactModal()">
            <span class="nav-icon">📞</span>
            <span>Hubungi</span>
        </a>
    </nav>

    <!-- Contacts Modal Window -->
    <div id="contactModal" class="modal-overlay" onclick="closeContactModal(event)">
        <div class="modal-content">
            <button class="close-btn" onclick="closeContactModal(event)">&times;</button>
            
            <div class="modal-tabs">
                <button id="tab1" class="tab-btn active" onclick="switchContactTab(0)">Pihak Perempuan</button>
                <button id="tab2" class="tab-btn" onclick="switchContactTab(1)">Pihak Lelaki</button>
            </div>

            <div class="slider-viewport">
                <div id="sliderTrack" class="slider-track">
                    <div id="contact-list-1" class="slide-page"></div>
                    <div id="contact-list-2" class="slide-page"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Unified Contact Data Objects
        const globalData = {
            contacts1: [
                { name: "Pn. Normizah", phone: "0129543925" },
                { name: "En. Asmawi", phone: "0126641202" },
                { name: "Pn. Norhasliza", phone: "0163670277" }
            ],
            contacts2: [
                { name: "En. Sharafae", phone: "0193044161" },
                { name: "Pn. Jamelah", phone: "01111059133" },
                { name: "Amirul", phone: "0164064161" }
            ]
        };

        function generateContactList(contacts) {
            let html = '';
            contacts.forEach(c => {
                const cleanPhone = c.phone.replace(/\s+/g, '');
                const waPhone = cleanPhone.startsWith('6') ? cleanPhone : `6${cleanPhone}`;
                
                html += `
                    <div class="contact-row">
                        <span class="contact-name">${c.name}</span>
                        <div class="contact-actions">
                            <a href="tel:${cleanPhone}">Call</a>
                            <a href="https://wa.me/${waPhone}" target="_blank">WhatsApp</a>
                        </div>
                    </div>
                `;
            });
            return html;
        }

        document.getElementById('contact-list-1').innerHTML = generateContactList(globalData.contacts1);
        document.getElementById('contact-list-2').innerHTML = generateContactList(globalData.contacts2);

        // 2. Open Invitation Logic Engine
        function openInvitation() {
            const audio = document.getElementById('weddingMusic');
            
            // Remove locking constraints, display elements
            document.body.classList.remove('locked');
            document.body.classList.add('revealed');
            
            // Interaction explicitly bypasses mobile auto-play blocks
            audio.play().then(() => {
                const musicBtn = document.getElementById('musicBtn');
                if(musicBtn) musicBtn.classList.add('playing'); 
            }).catch(error => {
                console.log("Audio playback interface block: ", error);
            });
            
            // Smoothly scroll down to details
            setTimeout(() => {
                document.getElementById('details').scrollIntoView({ behavior: 'smooth' });
            }, 100);
        }

        // 3. Audio Controller Action Handles
        function toggleMusic() {
            const audio = document.getElementById('weddingMusic');
            const musicBtn = document.getElementById('musicBtn');
            
            if (audio.paused) {
                audio.play().then(() => {
                    if(musicBtn) musicBtn.classList.add('playing');
                }).catch(error => {
                    console.log("Playback failed: ", error);
                });
            } else {
                audio.pause();
                if(musicBtn) musicBtn.classList.remove('playing');
            }
        }

        // 4. Modal Interface State Controls
        let currentTabIdx = 0;

        function openContactModal() {
            document.getElementById("contactModal").style.display = "flex";
            switchContactTab(0); 
        }

        function closeContactModal(event) {
            if (event.target.classList.contains('modal-overlay') || event.target.classList.contains('close-btn')) {
                document.getElementById("contactModal").style.display = "none";
            }
        }

        function switchContactTab(index) {
            currentTabIdx = index;
            const track = document.getElementById("sliderTrack");
            const t1 = document.getElementById("tab1");
            const t2 = document.getElementById("tab2");

            if (index === 0) {
                track.style.transform = "translateX(0%)";
                t1.classList.add("active");
                t2.classList.remove("active");
            } else {
                track.style.transform = "translateX(-50%)"; 
                t2.classList.add("active");
                t1.classList.remove("active");
            }
        }

        // 5. Native Touch Swipe Detection Logic
        let touchStartX = 0;
        let touchEndX = 0;
        const sliderViewport = document.querySelector('.slider-viewport');

        sliderViewport.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        sliderViewport.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipeGesture();
        }, { passive: true });

        function handleSwipeGesture() {
            const swipeThreshold = 50; 
            if (touchStartX - touchEndX > swipeThreshold) {
                switchContactTab(1);
            }
            if (touchEndX - touchStartX > swipeThreshold) {
                switchContactTab(0);
            }
        }

        // Wedding Event Timing Records
        const weddingData = {
            perempuan: {
                targetDate: "2026-08-29T12:00:00", 
                dateStr: "Sabtu, 29 Ogos 2026", 
                hijriStr: "16 Rabiulawal 1448", 
                timeStr: "12:00 PM - 5:00 PM (Bersanding: 1:00 PM)", 
                venue: "LOT 525, Kg Pohon Buloh, Pasir Mas, Kelantan.", 
                mapsUrl: "https://maps.app.goo.gl/K8B81AwwJ2ubPX6b9", 
                wazeUrl: "https://waze.com/ul?q=LOT+525+Kg+Pohon+Buloh+Pasir+Mas+Kelantan", 
            },
            lelaki: {
                targetDate: "2026-10-24T11:00:00", 
                dateStr: "Sabtu, 24 Okt 2026", 
                hijriStr: "13 Jamadilawal 1448", 
                timeStr: "11:00 AM - 4:30 PM (Bersanding: 11:15 AM)", 
                venue: "Bagan Serai Wedding Hall, Bagan Serai, Perak.", 
                mapsUrl: "https://maps.app.goo.gl/G7q1YJeRBPmo55dL8", 
                wazeUrl: "https://waze.com/ul?q=Bagan+Serai+Wedding+Hall+Perak", 
            }
        };

        let currentSide = 'perempuan';
        let countdownInterval;

        function switchEvent(side) {
            currentSide = side;
            
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            const index = side === 'perempuan' ? 0 : 1;
            document.querySelectorAll('.toggle-btn')[index].classList.add('active');
            
            const data = weddingData[side];
            document.getElementById('event-info').innerHTML = `
                <div class="info-label">Tarikh Majlis</div>
                <div class="info-value">${data.dateStr}<br><span style="font-size:0.8rem; font-weight:normal; color:var(--text-muted);">${data.hijriStr}</span></div>
                <div class="info-label">Aturcara Majlis</div>
                <div class="info-value">${data.timeStr}</div>
                <div class="info-label">Lokasi</div>
                <div class="info-value">${data.venue}</div>
            `;

            document.getElementById('go-maps').href = data.mapsUrl;
            document.getElementById('go-waze').href = data.wazeUrl;

            clearInterval(countdownInterval);
            startCountdown(data.targetDate);
        }

        function startCountdown(dateString) {
            const targetTime = new Date(dateString).getTime();

            function updateTimer() {
                const now = new Date().getTime();
                const difference = targetTime - now;

                if (difference <= 0) {
                    document.getElementById('days').innerText = "00";
                    document.getElementById('hours').innerText = "00";
                    document.getElementById('mins').innerText = "00";
                    document.getElementById('secs').innerText = "00";
                    clearInterval(countdownInterval);
                    return;
                }

                const d = Math.floor(difference / (1000 * 60 * 60 * 24));
                const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = d < 10 ? '0' + d : d;
                document.getElementById('hours').innerText = h < 10 ? '0' + h : h;
                document.getElementById('mins').innerText = m < 10 ? '0' + m : m;
                document.getElementById('secs').innerText = s < 10 ? '0' + s : s;
            }

            updateTimer();
            countdownInterval = setInterval(updateTimer, 1000);
        }

        // Initialize layout configurations on mount
        switchEvent('perempuan');
    </script>
</body>
</html>
